<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Offline — Orbitly</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0b0e1a">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body class="error-body">
<div class="aurora-bg" aria-hidden="true"><div class="aurora a1"></div><div class="aurora a2"></div></div>
<div class="error-wrap">
  <div class="orbit-loader small" aria-hidden="true"><span class="orbit-ring"></span><span class="orbit-dot"></span></div>
  <h1 style="font-size:2.4rem;">Kamu sedang offline</h1>
  <p>Halaman ini belum pernah dibuka sebelumnya sehingga belum tersimpan untuk mode offline. Coba buka kembali saat tersambung internet.</p>
  <button class="btn btn-primary ripple" onclick="location.reload()">Coba Lagi</button>
</div>
</body>
</html>
